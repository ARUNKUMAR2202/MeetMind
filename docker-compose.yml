# Usage:
#   cp backend/.env.example backend/.env   # fill in your real API keys
#   docker compose up --build
#
# Frontend: http://localhost:3000
# Backend:  http://localhost:8000  (docs at /docs)
#
# DATABASE_URL is overridden below to point at the `db` service regardless of what's
# in backend/.env (which defaults to SQLite for non-Docker local dev). Everything
# else (OPENAI_API_KEY, PINECONE_API_KEY, USE_MOCK_PIPELINE, etc.) comes from your
# backend/.env file via env_file.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meetmind
      POSTGRES_PASSWORD: meetmind
      POSTGRES_DB: meetmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backs session-status pub/sub and video-room signaling once REDIS_URL is set
  # (see backend/app/services/pubsub.py and room_manager.py) — required for the
  # BackgroundTasks job queue's status updates to work correctly if you ever run
  # more than one backend replica. Wired into the `backend` service below via
  # REDIS_URL. Not yet used for the background job QUEUE itself (still FastAPI
  # BackgroundTasks — see TASK_SPLIT.md for the Celery/RQ follow-up).
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://meetmind:meetmind@db:5432/meetmind
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/backend/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_uploads:
